spring.application.name=checkboki-backend
# Electron 프런트가 고정 주소로 접근하므로 로컬 API 포트를 8080으로 통일한다.
server.port=8080
server.error.include-message=always
# 환경 변수가 있으면 우선 사용하고, 비어 있으면 서비스가 backend/engine/stockfish.exe를 탐색한다.
chess-review.stockfish.path=${STOCKFISH_PATH:}
# 깊이가 커질수록 정확하지만 분석 시간이 늘어난다. 서비스에서 안전 범위 8~20으로 한 번 더 제한한다.
chess-review.stockfish.depth=${STOCKFISH_DEPTH:12}
# 지나치게 긴 기보가 CPU를 계속 점유하지 못하도록 분석할 반수의 상한을 둔다.
chess-review.stockfish.max-plies=160
# Chess.com PubAPI 정책에 맞게 호출 애플리케이션을 식별하는 User-Agent를 보낸다.
chess-review.chess-com.user-agent=CheckbokiDesktop/0.1 (local desktop application)
